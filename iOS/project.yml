name: Perfumecase
options:
  bundleIdPrefix: com.shimondeitel.perfumecase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Perfumecase:
    type: application
    platform: iOS
    sources:
      - path: Perfumecase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumecase
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Perfumecase/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  PerfumecaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PerfumecaseTests
      - path: Perfumecase.storekit
    dependencies:
      - target: Perfumecase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumecase.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  PerfumecaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PerfumecaseUITests
    dependencies:
      - target: Perfumecase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.perfumecase.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Perfumecase:
    build:
      targets:
        Perfumecase: all
        PerfumecaseTests: [test]
        PerfumecaseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Perfumecase.storekit
    test:
      config: Debug
      storeKitConfiguration: Perfumecase.storekit
      targets:
        - PerfumecaseTests
        - PerfumecaseUITests
    archive:
      config: Release
